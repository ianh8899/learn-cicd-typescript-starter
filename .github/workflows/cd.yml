name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push Docker image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/deep-mechanism-502208-r6/notely-ar-repo/notely:${{ github.sha }} .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/deep-mechanism-502208-r6/notely-ar-repo/notely:${{ github.sha }} --region us-central1 --allow-unauthenticated --project deep-mechanism-502208-r6 --max-instances=4